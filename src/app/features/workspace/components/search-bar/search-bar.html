<div class="bar">
  <form class="bar__field" (submit)="$event.preventDefault(); submit()">
    <label class="sr-only" for="ask-input">Describe the flat you're looking for</label>
    <span class="bar__hint" aria-hidden="true">Search</span>
    <input
      id="ask-input"
      class="bar__input"
      type="text"
      autocomplete="off"
      placeholder="Bright 2-room in Mokotów under 3500 zł with a balcony…"
      [value]="draft()"
      (input)="draft.set($any($event.target).value)"
      [disabled]="busy()"
    />
    <button
      class="bar__submit"
      type="submit"
      [disabled]="busy() || !draft().trim()"
      [attr.aria-label]="busy() ? 'Searching' : 'Search Seeker'"
    >
      @if (busy()) {
        <span class="bar__spinner" aria-hidden="true"></span>
      } @else {
        <span aria-hidden="true" style="line-height: 1rem">→</span>
      }
    </button>
  </form>

  <button
    type="button"
    class="bar__rerank"
    [class.is-on]="rerank()"
    (click)="toggleRerank()"
    [attr.aria-pressed]="rerank()"
    aria-describedby="rerank-tip"
  >
    <span class="bar__rerank-dot" aria-hidden="true"></span>
    Rerank
    <span class="sr-only">{{ rerank() ? 'on' : 'off' }}</span>
    <span class="bar__tip" id="rerank-tip" role="tooltip">
      @if (rerank()) {
        <strong>Rerank is on.</strong> The top matches are re-ordered by a second-pass
        relevance model for sharper results — at a higher token cost per search.
      } @else {
        Re-orders the top matches with a second-pass relevance model for sharper
        ordering. Uses more of your token budget per search.
      }
    </span>
  </button>

  <button
    type="button"
    class="bar__filters"
    [class.is-open]="filtersOpen()"
    (click)="toggleFilters.emit()"
    [attr.aria-expanded]="filtersOpen()"
    aria-controls="filter-panel"
  >
    <span aria-hidden="true" style="font-size:1.5rem">⚙</span>
    Filters
    @if (activeFilterCount() > 0) {
      <span class="bar__count data" aria-hidden="true">{{ activeFilterCount() }}</span>
      <span class="sr-only">{{ activeFilterCount() }} active</span>
    }
  </button>
</div>

@if (history().length > 0) {
  <div class="bar__history" role="group" aria-label="Recent searches">
    <span class="bar__history-label">Recent</span>
    @for (prompt of history(); track prompt) {
      <button
        type="button"
        class="bar__chip"
        [disabled]="busy()"
        [title]="prompt"
        (click)="runHistory(prompt)"
      >
        {{ prompt }}
      </button>
    }
  </div>
}
