name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let only one deploy run at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Adding environments
      - name: Inject API base URL
        run: |
          sed -i "s|https://REPLACE_ME.execute-api.eu-central-1.amazonaws.com|${{ vars.API_BASE_URL }}|" \
            src/environments/environment.prod.ts
      - run: npm ci
      - run: npx ng build --configuration production --base-href /seeker_/
      # SPA fallback so deep links / refreshes don't 404
      - run: cp dist/flat-searcher/browser/index.html dist/flat-searcher/browser/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/flat-searcher/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
